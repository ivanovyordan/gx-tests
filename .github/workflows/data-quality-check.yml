name: Full Data Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          cd dbt
          dbt deps
          cd -

      - name: Build models
        run: |
          cd dbt
          dbt seed
          dbt run
          cd -

      - name: Run all data tests
        run: bash test.sh